```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub File Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

button{
    padding:8px 15px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.upload-btn{
    background:#28a745;
    color:white;
}

.delete-btn{
    background:red;
    color:white;
}

.rename-btn{
    background:orange;
    color:white;
}

.refresh-btn{
    background:#007bff;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.progress{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>GitHub File Manager</h2>

    <input type="file" id="files" multiple>

    <br><br>

    <button class="upload-btn" onclick="uploadFiles()">
        Upload Files
    </button>

    <button class="refresh-btn" onclick="loadFiles()">
        Refresh
    </button>

    <div class="progress" id="progress"></div>
</div>

<div class="card">
    <input type="text"
           id="searchBox"
           placeholder="Search files..."
           onkeyup="filterFiles()">

    <table>
        <thead>
        <tr>
            <th>File Name</th>
            <th>Download</th>
            <th>Rename</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody id="fileTable"></tbody>
    </table>
</div>

<script>

const owner = "gouseshake0786";
const repo = "myweb";
const branch = "main";
const uploadFolder = "uploads";

let token = sessionStorage.getItem("githubToken");

if (!token) {
    token = prompt("Enter your GitHub Personal Access Token:");
    if (token) {
        sessionStorage.setItem("githubToken", token);
    }
}

const getHeaders = () => ({
    "Authorization": `token ${token}`,
    "Accept": "application/vnd.github+json"
});

async function uploadFiles(){

    const files = document.getElementById("files").files;

    if(files.length === 0){
        alert("Select files");
        return;
    }

    let uploaded = 0;

    for(const file of files){

        const base64 = await toBase64(file);

        const url =
        `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${file.name}`;

        const body = {
            message:`Upload ${file.name}`,
            content:base64,
            branch:branch
        };

        const response = await fetch(url,{
            method:"PUT",
            headers:getHeaders(),
            body:JSON.stringify(body)
        });

        if(response.ok){
            uploaded++;
        }
        else{
            console.error(await response.text());
        }

        document.getElementById("progress").innerHTML =
        `Uploaded ${uploaded}/${files.length}`;
    }

    alert("Upload completed");

    loadFiles();
}

function toBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => {
            resolve(reader.result.split(",")[1]);
        };

        reader.onerror = reject;
    });
}

async function loadFiles(){

    const url =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}`;

    const response = await fetch(url,{
        headers:getHeaders()
    });

    const files = await response.json();

    const table = document.getElementById("fileTable");

    table.innerHTML = "";

    files.forEach(file=>{

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${file.name}</td>

            <td>
                <a href="${file.download_url}" target="_blank">
                    Download
                </a>
            </td>

            <td>
                <button class="rename-btn"
                        onclick="renameFile('${file.name}')">
                        Rename
                </button>
            </td>

            <td>
                <button class="delete-btn"
                        onclick="deleteFile('${file.name}')">
                        Delete
                </button>
            </td>
        `;

        table.appendChild(row);
    });
}

async function deleteFile(fileName){

    if(!confirm(`Delete ${fileName}?`))
        return;

    const url =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${fileName}`;

    const fileResp = await fetch(url,{
        headers:getHeaders()
    });

    const fileData = await fileResp.json();

    const deleteResp = await fetch(url,{
        method:"DELETE",
        headers:getHeaders(),
        body:JSON.stringify({
            message:`Delete ${fileName}`,
            sha:fileData.sha,
            branch:branch
        })
    });

    if(deleteResp.ok){
        alert("Deleted");
        loadFiles();
    }
}

async function renameFile(oldName){

    const newName =
    prompt("Enter new file name:",oldName);

    if(!newName || newName===oldName)
        return;

    const oldUrl =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${oldName}`;

    const oldResp =
    await fetch(oldUrl,{headers:getHeaders()});

    const oldData =
    await oldResp.json();

    const rawContent =
    await fetch(oldData.download_url);

    const blob =
    await rawContent.blob();

    const base64 =
    await toBase64(blob);

    const newUrl =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${newName}`;

    await fetch(newUrl,{
        method:"PUT",
        headers:getHeaders(),
        body:JSON.stringify({
            message:`Rename ${oldName} -> ${newName}`,
            content:base64,
            branch:branch
        })
    });

    await fetch(oldUrl,{
        method:"DELETE",
        headers:getHeaders(),
        body:JSON.stringify({
            message:`Delete ${oldName}`,
            sha:oldData.sha,
            branch:branch
        })
    });

    alert("Renamed");

    loadFiles();
}

function filterFiles(){

    const search =
    document.getElementById("searchBox")
    .value.toLowerCase();

    const rows =
    document.querySelectorAll("#fileTable tr");

    rows.forEach(row=>{

        row.style.display =
        row.innerText.toLowerCase().includes(search)
        ? ""
        : "none";
    });
}

loadFiles();

</script>

</body>
</html>

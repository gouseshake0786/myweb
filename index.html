```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub File Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

button{
    padding:8px 15px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.upload-btn{
    background:#28a745;
    color:white;
}

.delete-btn{
    background:red;
    color:white;
}

.rename-btn{
    background:orange;
    color:white;
}

.refresh-btn{
    background:#007bff;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.progress{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
    <h2>GitHub File Manager</h2>

    <input type="file" id="files" multiple>

    <br><br>

    <button class="upload-btn" onclick="uploadFiles()">
        Upload Files
    </button>

    <button class="refresh-btn" onclick="loadFiles()">
        Refresh
    </button>

    <button style="background:#6c757d;color:white" onclick="manageToken()">
        Token
    </button>

    <div class="progress" id="progress"></div>
</div>

<div class="card">
    <input type="text"
           id="searchBox"
           placeholder="Search files..."
           onkeyup="filterFiles()">

    <table>
        <thead>
        <tr>
            <th>File Name</th>
            <th>Download</th>
            <th>Rename</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody id="fileTable"></tbody>
    </table>
</div>

<script>

const owner = "gouseshake0786";
const repo = "myweb";
const branch = "main";
const uploadFolder = "uploads";

let token = sessionStorage.getItem("githubToken");

if (!token) {
    token = prompt("Enter your GitHub Personal Access Token:");
    if (token) {
        sessionStorage.setItem("githubToken", token);
    }
}

const getHeaders = () => ({
    "Authorization": `token ${token}`,
    "Accept": "application/vnd.github+json"
});

async function uploadFiles(){

    if (!token) {
        alert("Please enter a GitHub token first");
        return;
    }

    const files = document.getElementById("files").files;

    if(files.length === 0){
        alert("Select files");
        return;
    }

    let uploaded = 0;

    for(const file of files){

        const base64 = await toBase64(file);

        const url =
        `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${file.name}`;

        const body = {
            message:`Upload ${file.name}`,
            content:base64,
            branch:branch
        };

        try {
            const response = await fetch(url,{
                method:"PUT",
                headers:getHeaders(),
                body:JSON.stringify(body)
            });

            if(response.ok){
                uploaded++;
            }
            else{
                const error = await response.json();
                console.error(`Upload failed for ${file.name}:`, error);
            }
        } catch (err) {
            console.error(`Upload error for ${file.name}:`, err);
        }

        document.getElementById("progress").innerHTML =
        `Uploaded ${uploaded}/${files.length}`;
    }

    alert("Upload completed");

    loadFiles();
}

function toBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => {
            resolve(reader.result.split(",")[1]);
        };

        reader.onerror = reject;
    });
}

async function loadFiles(){

    if (!token) {
        alert("Please enter a GitHub token first");
        return;
    }

    const url =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}`;

    try {
        const response = await fetch(url,{
            headers:getHeaders()
        });

        if (!response.ok) {
            const error = await response.json();
            console.error("GitHub API Error:", error);
            alert(`Error: ${error.message}`);
            return;
        }

        const files = await response.json();

        if (!Array.isArray(files)) {
            console.error("Unexpected response:", files);
            alert("Error: Invalid response from GitHub");
            return;
        }

        const table = document.getElementById("fileTable");

        table.innerHTML = "";

        files.forEach(file=>{

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${file.name}</td>

                <td>
                    <a href="${file.download_url}" target="_blank">
                        Download
                    </a>
                </td>

                <td>
                    <button class="rename-btn"
                            onclick="renameFile('${file.name}')">
                            Rename
                    </button>
                </td>

                <td>
                    <button class="delete-btn"
                            onclick="deleteFile('${file.name}')">
                            Delete
                    </button>
                </td>
            `;

            table.appendChild(row);
        });
    } catch (err) {
        console.error("Error loading files:", err);
        alert("Error loading files: " + err.message);
    }
}

async function deleteFile(fileName){

    if (!token) {
        alert("Please enter a GitHub token first");
        return;
    }

    if(!confirm(`Delete ${fileName}?`))
        return;

    const url =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${fileName}`;

    try {
        const fileResp = await fetch(url,{
            headers:getHeaders()
        });

        if (!fileResp.ok) {
            const error = await fileResp.json();
            alert(`Error: ${error.message}`);
            return;
        }

        const fileData = await fileResp.json();

        const deleteResp = await fetch(url,{
            method:"DELETE",
            headers:getHeaders(),
            body:JSON.stringify({
                message:`Delete ${fileName}`,
                sha:fileData.sha,
                branch:branch
            })
        });

        if(deleteResp.ok){
            alert("Deleted");
            loadFiles();
        } else {
            const error = await deleteResp.json();
            alert(`Delete failed: ${error.message}`);
        }
    } catch (err) {
        console.error("Delete error:", err);
        alert("Error deleting file: " + err.message);
    }
}

async function renameFile(oldName){

    if (!token) {
        alert("Please enter a GitHub token first");
        return;
    }

    const newName =
    prompt("Enter new file name:",oldName);

    if(!newName || newName===oldName)
        return;

    const oldUrl =
    `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${oldName}`;

    try {
        const oldResp =
        await fetch(oldUrl,{headers:getHeaders()});

        if (!oldResp.ok) {
            const error = await oldResp.json();
            alert(`Error: ${error.message}`);
            return;
        }

        const oldData =
        await oldResp.json();

        const rawContent =
        await fetch(oldData.download_url);

        const blob =
        await rawContent.blob();

        const base64 =
        await toBase64(blob);

        const newUrl =
        `https://api.github.com/repos/${owner}/${repo}/contents/${uploadFolder}/${newName}`;

        await fetch(newUrl,{
            method:"PUT",
            headers:getHeaders(),
            body:JSON.stringify({
                message:`Rename ${oldName} -> ${newName}`,
                content:base64,
                branch:branch
            })
        });

        await fetch(oldUrl,{
            method:"DELETE",
            headers:getHeaders(),
            body:JSON.stringify({
                message:`Delete ${oldName}`,
                sha:oldData.sha,
                branch:branch
            })
        });

        alert("Renamed");

        loadFiles();
    } catch (err) {
        console.error("Rename error:", err);
        alert("Error renaming file: " + err.message);
    }
}

function filterFiles(){

    const search =
    document.getElementById("searchBox")
    .value.toLowerCase();

    const rows =
    document.querySelectorAll("#fileTable tr");

    rows.forEach(row=>{

        row.style.display =
        row.innerText.toLowerCase().includes(search)
        ? ""
        : "none";
    });
}

function manageToken(){
    const choice = prompt("Enter 'set' to set a new token, or 'clear' to remove the current token:");
    
    if (choice === "set") {
        const newToken = prompt("Enter your GitHub Personal Access Token:");
        if (newToken) {
            token = newToken;
            sessionStorage.setItem("githubToken", token);
            alert("Token saved");
            loadFiles();
        }
    } else if (choice === "clear") {
        token = null;
        sessionStorage.removeItem("githubToken");
        document.getElementById("fileTable").innerHTML = "";
        alert("Token cleared");
    }
}

if (token) {
    loadFiles();
}

</script>

</body>
</html>
